<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIOSA JACKPOT HUB</title>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://checkout.flutterwave.com/v3.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #064e3b, #0f766e);
    background-attachment: fixed;
}
.glass {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
}
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999;
}
.fancy-gradient {
    background: linear-gradient(135deg, #064e3b, #065f46, #022c22);
}
.chat-toggle {
    position: fixed;
    left: 20px;
    bottom: 20px;
    background: #065f46;
    color: white;
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    z-index: 1000;
}
.chat-box {
    display: none;
    position: fixed;
    left: 20px;
    bottom: 70px;
    width: 260px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    overflow: hidden;
    z-index: 999;
}
.chat-header {
    background: #065f46;
    color: white;
    padding: 8px;
    text-align: center;
    font-size: 12px;
}
.chat-input {
    display: flex;
    border-top: 1px solid #eee;
}
.chat-input input {
    flex: 1;
    padding: 8px;
    border: none;
    outline: none;
    font-size: 12px;
}
.chat-input button {
    background: #065f46;
    color: white;
    border: none;
    padding: 8px 10px;
}
</style>
</head>

<body>

<div class="fancy-gradient text-white text-center p-6">
    <h1 class="text-3xl font-black tracking-widest uppercase">
        BIOSA × EMT JACKPOT HUB
    </h1>
    <p id="db-indicator" class="text-[10px] opacity-50 italic">System: Connecting...</p>
</div>

<main class="max-w-xl mx-auto p-4">

<div class="glass text-center p-4 rounded-2xl shadow mt-4">
    <p class="text-xs font-bold uppercase text-green-700 tracking-widest">Live Players Online</p>
    <h2 id="livePlayers" class="text-3xl font-black text-slate-800">0</h2>
</div>

<div class="glass text-slate-900 p-5 rounded-2xl text-center shadow-lg mt-4">
    <p class="text-[10px] font-bold text-green-700 mb-1">SESSION ENDS IN:</p>
    <div class="flex justify-around">
        <div><span id="mins" class="text-3xl font-black">00</span><p class="text-[10px]">MINS</p></div>
        <div><span id="secs" class="text-3xl font-black text-green-600">00</span><p class="text-[10px]">SECS</p></div>
    </div>
</div>

<div class="glass p-6 rounded-2xl shadow-xl mt-5">
    <input id="nickname" class="w-full p-3 border rounded-xl mb-3" placeholder="Nickname (Required)">
    <input id="email" class="w-full p-3 border rounded-xl mb-3" placeholder="Email (Required)">
    <button onclick="pay()" class="w-full bg-green-700 text-white p-3 rounded-xl font-bold shadow-lg">PAY ₦100 & GET CODE</button>
</div>

<div id="codeBox" class="hidden bg-green-600 text-white p-5 rounded-2xl mt-5 text-center shadow-lg">
    <p class="text-xs uppercase font-bold">Your Access Code:</p>
    <h1 id="code" class="text-4xl font-black"></h1>
    <p class="text-[10px] mt-2">Save this code to check your results later!</p>
</div>

<div class="glass p-6 rounded-2xl shadow-xl mt-5 border-2 border-slate-400">
    <h2 class="font-bold text-center mb-3 text-slate-800 italic uppercase text-xs">Forgot your code?</h2>
    <input id="searchRef" class="w-full p-3 border rounded-xl mb-3 text-sm" placeholder="Enter Payment Reference (e.g. 4235...)">
    <button onclick="retrieveLostCode()" class="w-full bg-slate-600 text-white p-2 rounded-xl font-bold text-sm">RETRIEVE CODE</button>
    <p id="retrievalDisplay" class="mt-3 text-center font-bold text-slate-700 text-sm"></p>
</div>

<div class="glass p-6 rounded-2xl shadow-xl mt-5">
    <input id="loginCode" class="w-full p-3 border rounded-xl mb-3" placeholder="Enter Access Code">
    <button onclick="login()" class="w-full bg-black text-white p-3 rounded-xl font-bold">LOGIN TO PLAY</button>
    <p id="loginStatus" class="mt-2 font-bold text-green-700"></p>
</div>

<div id="gameBox" class="glass p-6 rounded-2xl shadow-xl mt-5 hidden">
    <input id="guess" type="number" class="w-full p-3 border rounded-xl mb-3" placeholder="Enter your lucky number">
    <button onclick="submitGuess()" class="w-full bg-green-700 text-white p-3 rounded-xl font-bold">SUBMIT GUESS</button>
</div>

<div class="glass p-6 rounded-2xl shadow-xl mt-5 border-2 border-green-600">
    <h2 class="font-bold text-center mb-3 text-green-800">CHECK PREVIOUS RESULTS</h2>
    <input id="resultCheckCode" class="w-full p-3 border rounded-xl mb-3" placeholder="Enter Your Played Code">
    <button onclick="checkUserResult()" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold">VIEW RESULT</button>
    <p id="resultDisplay" class="mt-3 text-center font-bold text-slate-700"></p>
</div>

<div class="glass p-5 rounded-2xl shadow-xl mt-5">
    <h2 class="font-bold mb-3">Winners Board</h2>
    <div id="board"></div>
</div>

</main>

<a class="whatsapp-float" href="https://wa.me/2349161605444" target="_blank">
<div style="background:#25D366;padding:12px 16px;border-radius:50px;color:white;font-weight:bold;">💬 WhatsApp</div>
</a>

<div class="chat-toggle" onclick="toggleChat()">💬 Chat</div>

<div class="chat-box" id="chatBox">
    <div class="chat-header">LIVE CHAT</div>
    <div id="chatMessages" style="height:180px;overflow-y:auto;padding:10px;font-size:12px;display:flex;flex-direction:column;"></div>
    <div class="chat-input">
        <input id="chatInput" placeholder="Type message...">
        <button onclick="sendChat()">Send</button>
    </div>
</div>

<script>
// --- FIREBASE INITIALIZATION ---
const firebaseConfig = {
  apiKey: "AIzaSyBQDEsK-m8xMjiEksQm3cm_zUY9y2iJ5RU",
  authDomain: "my-jackpot-2cd55.firebaseapp.com",
  databaseURL: "https://my-jackpot-2cd55-default-rtdb.firebaseio.com",
  projectId: "my-jackpot-2cd55",
  storageBucket: "my-jackpot-2cd55.firebasestorage.app",
  messagingSenderId: "747650443003",
  appId: "1:747650443003:web:afb517a0ab3d623ddff25e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
document.getElementById('db-indicator').innerText = "✅ System Online";

const FORM = "https://formspree.io/f/xaqaeqjy";
let WINNING_NUMBER = "77"; 

// Real-time Winning Number Sync
db.ref('settings/winningNumber').on('value', s => { if(s.val()) WINNING_NUMBER = s.val(); });

let currentUser = null;
let currentSessionHour = new Date().getHours();

/* ================= UI LOGIC ================= */
function updateLivePlayers() {
    document.getElementById("livePlayers").innerText = 42 + Math.floor(Math.random() * 10);
}
setInterval(updateLivePlayers, 3000);
updateLivePlayers();

function updateCountdown() {
    const now = new Date();
    document.getElementById("mins").innerText = (59 - now.getMinutes()).toString().padStart(2, '0');
    document.getElementById("secs").innerText = (59 - now.getSeconds()).toString().padStart(2, '0');
}
setInterval(updateCountdown, 1000);

/* ================= CHAT ================= */
let chats = JSON.parse(localStorage.getItem("jackpotChats") || "[]");
function toggleChat() {
    const box = document.getElementById("chatBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
    loadChat();
}
function sendChat() {
    const input = document.getElementById("chatInput");
    if (!input.value.trim()) return;
    chats.push("👤 " + input.value);
    localStorage.setItem("jackpotChats", JSON.stringify(chats));
    input.value = "";
    loadChat();
}
function loadChat() {
    const box = document.getElementById("chatMessages");
    box.innerHTML = "";
    chats.forEach(msg => {
        const p = document.createElement("p");
        p.innerText = msg; p.style.marginBottom = "6px"; box.appendChild(p);
    });
    box.scrollTop = box.scrollHeight;
}
loadChat();

/* ================= CORE ACTIONS ================= */
function pay() {
    const email = document.getElementById("email").value;
    const nickname = document.getElementById("nickname").value;
    if (!email || !nickname) return alert("Nickname and Email are required");

    FlutterwaveCheckout({
        public_key: "FLWPUBK_TEST-e901ddb220d390db03c72ca07954cbdf-X",
        tx_ref: "TX-" + Date.now(),
        amount: 100, currency: "NGN",
        customer: { email, name: nickname },
        callback: function(data) {
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            const sessionHour = new Date().getHours();

            // SAVE TO FIREBASE & LOCAL
            db.ref('codes/' + code).set({
                nickname: nickname, email: email, paid: true, used: false, hour: sessionHour, ref: data.transaction_id
            }).then(() => {
                localStorage.setItem("jackpotCode", code);
                localStorage.setItem("userNickname", nickname);
                localStorage.setItem("userEmail", email);
                localStorage.setItem("session_hour_" + code, sessionHour);

                document.getElementById("codeBox").classList.remove("hidden");
                document.getElementById("code").innerText = code;
                
                // Formspree backup
                fetch(FORM, {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({ Nickname: nickname, Code: code, Ref: data.transaction_id })
                });
                alert("Payment successful! Access Code: " + code);
            });
        }
    });
}

function retrieveLostCode() {
    const refInput = document.getElementById("searchRef").value.trim();
    const display = document.getElementById("retrievalDisplay");
    if(!refInput) return alert("Please enter your Payment Ref");

    display.innerText = "Searching database...";
    
    // Scan the 'codes' node for the matching 'ref'
    db.ref('codes').once('value').then(snapshot => {
        let foundCode = null;
        snapshot.forEach(child => {
            if(child.val().ref == refInput) {
                foundCode = child.key;
            }
        });

        if(foundCode) {
            display.innerText = "✅ Found! Your Access Code is: " + foundCode;
            display.className = "mt-3 text-center font-bold text-green-700 text-sm";
        } else {
            display.innerText = "❌ Reference not found. Check and try again.";
            display.className = "mt-3 text-center font-bold text-red-600 text-sm";
        }
    });
}

function login() {
    const input = document.getElementById("loginCode").value.trim();
    db.ref('codes/' + input).once('value').then(s => {
        const d = s.val();
        if(d && d.paid) {
            if(d.used) return alert("This code has already been used!");
            currentUser = input;
            document.getElementById("loginStatus").innerText = "Welcome, " + d.nickname;
            document.getElementById("gameBox").classList.remove("hidden");
        } else { alert("Invalid or unpaid code."); }
    });
}

function submitGuess() {
    const val = document.getElementById("guess").value;
    if(!currentUser || !val) return alert("Login first");

    db.ref('codes/' + currentUser).once('value').then(s => {
        if(s.val().used) return alert("Vote already cast!");
        
        let winStatus = (val === WINNING_NUMBER) ? "WINNER" : "NOT A MATCH";
        localStorage.setItem("result_" + currentUser, winStatus);

        db.ref('codes/' + currentUser).update({ used: true, guess: val, result: winStatus })
        .then(() => {
            alert("Guess submitted successfully!");
            location.reload();
        });
    });
}

function checkUserResult() {
    const checkCode = document.getElementById("resultCheckCode").value.trim();
    const display = document.getElementById("resultDisplay");
    
    db.ref('codes/' + checkCode).once('value').then(s => {
        const d = s.val();
        if(!d || !d.used) return alert("No result found.");
        
        const currentHour = new Date().getHours();
        if (currentHour == d.hour) {
            display.innerText = "⏳ Session still live. Results reveal next hour!";
            display.className = "mt-3 text-center font-bold text-orange-600";
        } else {
            display.innerText = d.result === "WINNER" ? "🎉 WINNER!" : "📉 No match.";
            display.className = "mt-3 text-center font-bold " + (d.result === "WINNER" ? "text-green-600" : "text-red-600");
        }
    });
}

const winners = [{ name: "BIOSA-4821", prize: "₦2000" }, { name: "EMT-1103", prize: "₦1500" }];
document.getElementById("board").innerHTML = winners.map(w => `<p class="border-b py-2 text-sm">🏆 ${w.name} - ${w.prize}</p>`).join("");
</script>
</body>
</html>
