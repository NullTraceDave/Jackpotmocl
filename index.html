<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIOSA JACKPOT HUB</title>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://checkout.flutterwave.com/v3.js"></script>

<style>
body { font-family: Arial; background: linear-gradient(135deg, #0f172a, #064e3b, #0f766e); background-attachment: fixed; overflow-x: hidden; }
.glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
.fancy-gradient { background: linear-gradient(135deg, #064e3b, #065f46, #022c22); }
#sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #022c22; color: white; transition: 0.3s ease; z-index: 2000; box-shadow: 10px 0 20px rgba(0,0,0,0.4); }
#sidebar.active { left: 0; }
.menu-item { padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
.menu-item:hover { background: #065f46; }
</style>
</head>

<body>

<div id="sidebar">
    <div class="p-6 text-xl font-black border-b border-white/10 uppercase tracking-tighter">Jackpot Menu</div>
    <div class="menu-item" onclick="showView('play')">🕹️ Play Game</div>
    <div class="menu-item" onclick="showView('whitepaper')">📄 White Paper</div>
    <div class="menu-item" onclick="showView('about')">🏢 About BIOSA</div>
    <div class="menu-item" onclick="showView('contact')">📞 Contact Us</div>
    <div class="p-6 mt-10"><button onclick="toggleMenu()" class="w-full bg-red-800/50 py-2 rounded text-xs">CLOSE MENU</button></div>
</div>

<div class="fancy-gradient text-white text-center p-6 relative">
    <button onclick="toggleMenu()" class="absolute left-5 top-7 text-2xl">☰</button>
    <h1 class="text-3xl font-black tracking-widest uppercase">BIOSA × EMT</h1>
    <p id="db-indicator" class="text-[10px] opacity-50 italic">System: Connecting...</p>
</div>

<main class="max-w-xl mx-auto p-4">

    <div id="play-view" class="view-container">
        <div class="glass text-center p-4 rounded-2xl shadow mt-4">
            <p class="text-xs font-bold uppercase text-green-700 tracking-widest">Live Players Online</p>
            <h2 id="livePlayers" class="text-3xl font-black text-slate-800">0</h2>
        </div>

        <div class="glass text-slate-900 p-5 rounded-2xl text-center shadow-lg mt-4">
            <p class="text-[10px] font-bold text-green-700 mb-1">SESSION ENDS IN:</p>
            <div class="flex justify-around">
                <div><span id="mins" class="text-3xl font-black">00</span><p class="text-[10px]">MINS</p></div>
                <div><span id="secs" class="text-3xl font-black text-green-600">00</span><p class="text-[10px]">SECS</p></div>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl shadow-xl mt-5">
            <input id="nickname" class="w-full p-3 border rounded-xl mb-3" placeholder="Nickname (Required)">
            <input id="email" class="w-full p-3 border rounded-xl mb-3" placeholder="Email (Required)">
            <button onclick="pay()" class="w-full bg-green-700 text-white p-3 rounded-xl font-bold shadow-lg">PAY ₦100 & GET CODE</button>
        </div>

        <div id="codeBox" class="hidden bg-green-600 text-white p-5 rounded-2xl mt-5 text-center shadow-lg">
            <p class="text-xs uppercase font-bold">Your Access Code:</p>
            <h1 id="code" class="text-4xl font-black"></h1>
        </div>

        <div class="glass p-6 rounded-2xl shadow-xl mt-5">
            <input id="loginCode" class="w-full p-3 border rounded-xl mb-3" placeholder="Enter Access Code">
            <button onclick="login()" class="w-full bg-black text-white p-3 rounded-xl font-bold">LOGIN TO PLAY</button>
            <p id="loginStatus" class="mt-2 font-bold text-green-700 text-center"></p>
        </div>

        <div id="gameBox" class="glass p-6 rounded-2xl shadow-xl mt-5 hidden">
            <input id="guess" type="number" class="w-full p-3 border rounded-xl mb-3" placeholder="Enter lucky number">
            <button onclick="submitGuess()" class="w-full bg-green-700 text-white p-3 rounded-xl font-bold">SUBMIT GUESS</button>
        </div>

        <div class="glass p-6 rounded-2xl shadow-xl mt-5 border-2 border-green-600">
            <h2 class="font-bold text-center mb-3 text-green-800">CHECK RESULTS</h2>
            <input id="resultCheckCode" class="w-full p-3 border rounded-xl mb-3" placeholder="Enter Your Played Code">
            <button onclick="checkUserResult()" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold">VIEW RESULT</button>
            <div id="resultDisplay" class="mt-3 text-center"></div>
        </div>
    </div>

</main>

<script>
// --- CORE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyBQDEsK-m8xMjiEksQm3cm_zUY9y2iJ5RU",
  authDomain: "my-jackpot-2cd55.firebaseapp.com",
  databaseURL: "https://my-jackpot-2cd55-default-rtdb.firebaseio.com",
  projectId: "my-jackpot-2cd55",
  storageBucket: "my-jackpot-2cd55.firebasestorage.app",
  messagingSenderId: "747650443003",
  appId: "1:747650443003:web:afb517a0ab3d623ddff25e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
document.getElementById('db-indicator').innerText = "✅ System Online";

const FORM = "https://formspree.io/f/mlgajvnv";
const TG_TOKEN = "8695421369:AAHh_w4uqyikxPHLQ4At-AyiZnSnEJTm0eU";
const TG_CHAT = "1162133317";

let WINNING_NUMBER = "Pending"; 
db.ref('settings/winningNumber').on('value', s => { 
    if(s.val()) WINNING_NUMBER = s.val().toString(); 
});

let currentUser = null;

// REPAIRED TELEGRAM FUNCTION (NO MARKDOWN)
function notifyTG(msg) {
    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: TG_CHAT, text: msg }) // Removed Markdown to fix block
    }).catch(e => console.log("TG Error"));
}

function toggleMenu() { document.getElementById("sidebar").classList.toggle("active"); }
function showView(viewId) {
    document.querySelectorAll('.view-container').forEach(v => v.classList.add('hidden'));
    document.getElementById(viewId + '-view').classList.remove('hidden');
    toggleMenu();
}

setInterval(() => {
    const now = new Date();
    document.getElementById("mins").innerText = (59 - now.getMinutes()).toString().padStart(2, '0');
    document.getElementById("secs").innerText = (59 - now.getSeconds()).toString().padStart(2, '0');
    document.getElementById("livePlayers").innerText = 42 + Math.floor(Math.random() * 10);
}, 1000);

function pay() {
    const email = document.getElementById("email").value;
    const nickname = document.getElementById("nickname").value;
    if (!email || !nickname) return alert("Required fields missing");

    FlutterwaveCheckout({
        public_key: "FLWPUBK_TEST-e901ddb220d390db03c72ca07954cbdf-X",
        tx_ref: "TX-" + Date.now(),
        amount: 100, currency: "NGN",
        customer: { email, name: nickname },
        callback: function(data) {
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById("codeBox").classList.remove("hidden");
            document.getElementById("code").innerText = code;
            alert("Success! Your code is: " + code);

            const payload = {
                Submission_Type: "PAYMENT_RECEIPT", Nickname: nickname,
                User_Email: email, Code: code, Ref: data.transaction_id,
                Status: "PAID", Timestamp: new Date().toLocaleString()
            };

            db.ref('codes/' + code).set({ nickname, email, paid: true, used: false, hour: new Date().getHours(), ref: data.transaction_id })
            .then(() => {
                notifyTG("💰 NEW PAYMENT\nUser: " + nickname + "\nCode: " + code + "\nRef: " + data.transaction_id);
                fetch(FORM, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(payload) });
            });
        }
    });
}

function login() {
    const input = document.getElementById("loginCode").value.trim();
    db.ref('codes/' + input).once('value').then(s => {
        const d = s.val();
        if(d && d.paid && !d.used) {
            currentUser = input;
            document.getElementById("loginStatus").innerText = "Welcome, " + d.nickname;
            document.getElementById("gameBox").classList.remove("hidden");
        } else { alert("Code invalid or used."); }
    });
}

function submitGuess() {
    const val = document.getElementById("guess").value;
    if(!currentUser || !val) return alert("Enter guess");

    db.ref('codes/' + currentUser).once('value').then(s => {
        const d = s.val();
        let status = (String(val).trim() === String(WINNING_NUMBER).trim()) ? "WINNER" : "NOT A MATCH";
        
        const payload = {
            Submission_Type: "GUESS_SUBMISSION", Nickname: d.nickname,
            User_Email: d.email, Used_Access_Code: currentUser,
            Guess: val, Match_Result: status, Payment_Ref_Used: d.ref,
            Timestamp: new Date().toLocaleString()
        };

        // CRITICAL: We save the winning number AT THE MOMENT OF GUESS so it's never lost
        db.ref('codes/' + currentUser).update({ 
            used: true, 
            guess: val, 
            result: status, 
            revealedWinNum: WINNING_NUMBER 
        })
        .then(() => {
            notifyTG("🎯 NEW GUESS\nUser: " + d.nickname + "\nGuess: " + val + "\nResult: " + status);
            fetch(FORM, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(payload) });
            alert("Guess Logged!"); location.reload();
        });
    });
}

function checkUserResult() {
    const checkCode = document.getElementById("resultCheckCode").value.trim();
    const display = document.getElementById("resultDisplay");
    db.ref('codes/' + checkCode).once('value').then(s => {
        const d = s.val();
        if(!d || !d.used) return alert("Result not found.");
        
        const color = d.result === "WINNER" ? "text-green-600" : "text-red-600";
        // Logic: Show the number saved in their record, if missing, show current live number
        const winNum = d.revealedWinNum || WINNING_NUMBER;
        
        display.innerHTML = `
            <p class="font-black text-xl ${color}">${d.result}</p>
            <p class="text-xs">Your Guess: ${d.guess}</p>
            <p class="text-sm font-bold">Correct Number was: ${winNum}</p>
        `;
    });
}
</script>
</body>
</html>
